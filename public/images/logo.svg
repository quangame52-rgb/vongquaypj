<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d5259" />
      <stop offset="100%" stop-color="#021c1e" />
    </radialGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="35%" stop-color="#f1f5f9" />
      <stop offset="70%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Outer Oval Ring -->
  <ellipse cx="200" cy="145" rx="65" ry="90" fill="none" stroke="url(#silverGrad)" stroke-width="2.5" opacity="0.9" />

  <!-- Interlocking PJ Monogram -->
  <g filter="url(#glow)">
    <!-- P -->
    <path d="M 182 80 L 182 190 M 182 80 C 222 80, 232 130, 182 140" fill="none" stroke="url(#silverGrad)" stroke-width="8" stroke-linecap="round"/>
    <!-- J -->
    <path d="M 218 100 L 218 185 C 218 222, 174 222, 172 190" fill="none" stroke="url(#silverGrad)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Sparkle Stars -->
  <polygon points="182,140 185,134 188,140 185,146" fill="#ffffff"/>
  <polygon points="218,100 221,94 224,100 221,106" fill="#ffffff"/>
  <polygon points="172,190 175,184 178,190 175,196" fill="#ffffff"/>

  <!-- PJ CLINIC Text -->
  <text x="200" y="295" font-family="'Outfit', 'Montserrat', sans-serif" font-weight="900" font-size="34" fill="url(#silverGrad)" text-anchor="middle" letter-spacing="4" filter="url(#glow)">PJ CLINIC</text>

  <!-- BÌNH DƯƠNG Text -->
  <text x="200" y="335" font-family="'Outfit', 'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="18" fill="#e2e8f0" text-anchor="middle" letter-spacing="6">BÌNH DƯƠNG</text>
</svg>
